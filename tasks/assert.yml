---
- name: Validate Fail2Ban time settings
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default='') | string | trim is regex('^\d+[smhdw]?$')
    fail_msg: "{{ item }} must be a Fail2Ban time value such as 600, 30m, 1h, 1d, or 1w."
    quiet: true
  loop:
    - f2b_bantime
    - f2b_findtime

- name: Validate optional non-negative integer settings
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default=0) | int >= 0
    fail_msg: "{{ item }} must be greater than or equal to zero."
    quiet: true
  loop:
    - f2b_bantime_rndtime
    - f2b_bantime_maxtime
    - f2b_bantime_factor
    - f2b_maxretry

- name: Ensure only one custom incremental bantime strategy is configured
  ansible.builtin.assert:
    that:
      - not (
          f2b_bantime_formula | string | trim | length > 0 and
          f2b_bantime_multipliers | string | trim | length > 0
        )
    fail_msg: >-
      Only one variable can be set: f2b_bantime_formula or f2b_bantime_multipliers.
    quiet: true

- name: Validate f2b_ignoreip is not empty
  ansible.builtin.assert:
    that:
      - f2b_ignoreip | string | trim | length > 0
    fail_msg: f2b_ignoreip must not be empty.
    quiet: true

- name: Validate jail names and settings
  ansible.builtin.assert:
    that:
      - item.name | string | trim | length > 0
      - item.settings | length > 0
    fail_msg: Each f2b_jails entry must include a non-empty name and at least one setting.
    quiet: true
  loop: "{{ f2b_jails }}"
  loop_control:
    label: "{{ item.name | default('undefined') }}"

- name: Validate jail setting values
  ansible.builtin.assert:
    that:
      - item.key | string | trim | length > 0
      - item.state | default('present') in ['present', 'absent']
      - item.state | default('present') == 'absent' or item.value is defined
      - item.state | default('present') == 'absent' or item.value | string | length > 0
    fail_msg: >-
      Each jail setting must include key, valid state, and value when state is present.
    quiet: true
  loop: "{{ f2b_jails | map(attribute='settings') | flatten }}"
  loop_control:
    label: "{{ item.key | default('undefined') }}"
