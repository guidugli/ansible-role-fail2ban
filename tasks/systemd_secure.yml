---
- name: Populate service facts
  ansible.builtin.service_facts:

- name: Apply Fail2Ban systemd hardening when systemd manages the service
  when:
    - ansible_facts.services['fail2ban.service'] is defined
    - ansible_facts.services['fail2ban.service'].source == 'systemd'
  block:
    - name: Create directories required by Fail2Ban hardening
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      loop:
        - /etc/systemd/system/fail2ban.service.d
        - /var/log/fail2ban

    - name: Install Fail2Ban systemd hardening override
      ansible.builtin.copy:
        src: override.conf
        dest: /etc/systemd/system/fail2ban.service.d/override.conf
        owner: root
        group: root
        mode: '0644'
      notify: Force systemd to reread configs

    - name: Set hardened Fail2Ban log path
      community.general.ini_file:
        path: "{{ fail2ban_cfg_dir }}/fail2ban.local"
        section: Definition
        option: logtarget
        value: /var/log/fail2ban/fail2ban.log
        mode: '0644'
        owner: root
        group: root
      notify: Restart fail2ban

    - name: Delete Fail2Ban log file from old location
      ansible.builtin.file:
        path: /var/log/fail2ban.log
        state: absent
      when: f2b_systemd_sec_delete_old_log or fb_systemd_sec_delete_old_log
