---
- name: Shared prepare (bootstrap python + essentials)
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Detect OS via /etc/os-release (works without python)
      ansible.builtin.raw: cat /etc/os-release
      register: osr
      changed_when: false

    - name: Install python on Debian/Ubuntu
      ansible.builtin.raw: >
        /bin/sh -c 'set -e;
        export DEBIAN_FRONTEND=noninteractive;
        apt-get update;
        apt-get install -y --no-install-recommends python3 python3-apt sudo ca-certificates iproute2;
        rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*'
      when: "'ID=debian' in osr.stdout or 'ID=ubuntu' in osr.stdout"
      changed_when: true

    - name: Install python on Fedora
      ansible.builtin.raw: >
        /bin/sh -c 'set -e;
        dnf install -y python3 python3-dnf sudo ca-certificates iproute;
        dnf clean all;
        rm -rf /var/cache/dnf/* /tmp/* /var/tmp/*'
      when: "'ID=fedora' in osr.stdout"
      changed_when: true

    - name: Gather minimal package manager facts
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "!min"
          - distribution
          - pkg_mgr

    - name: Enable epel release on RHEL
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when:
        - ansible_facts.os_family == "RedHat"
        - ansible_facts.pkg_mgr == "dnf"

    - name: Simulate sshd file to prevent error
      ansible.builtin.file:
        path: /var/log/auth.log
        state: touch
        mode: "0644"
        owner: root
        group: root
        modification_time: preserve
        access_time: preserve
