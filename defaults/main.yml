---
# defaults file for guidugli.fail2ban

# Service behavior. Privilege escalation is expected to be controlled by the play.
f2b_manage_service: true

# Optional systemd hardening. This is only applied when systemd service facts show
# fail2ban.service is managed by systemd.
f2b_systemd_secure: false
f2b_systemd_sec_delete_old_log: false

# Compatibility alias for the older variable name. Prefer f2b_systemd_sec_delete_old_log.
fb_systemd_sec_delete_old_log: false

# Fail2Ban DEFAULT jail settings managed in jail.local.
f2b_bantime_increment: false
f2b_bantime_rndtime: 120
f2b_bantime_maxtime: 0
f2b_bantime_factor: 1
f2b_bantime_formula: ""
f2b_bantime_multipliers: ""
f2b_bantime_overalljails: false
f2b_ignoreself: true
f2b_ignoreip: "127.0.0.1/8 ::1"
f2b_bantime: "30m"
f2b_findtime: "30m"
f2b_maxretry: 5
f2b_maxmatches: "%(maxretry)s"
f2b_usedns: "warn"
f2b_destemail: "root@localhost"
f2b_sender: "root@localhost"
f2b_mta: "sendmail"

# Per-jail settings to manage in jail.local.
f2b_jails: []
# Example:
# f2b_jails:
#     - name: sshd
#       settings:
#           - key: enabled
#             value: "true"
#           - key: mode
#             value: normal
#           - key: port
#             value: "22"
#           - key: backend
#             state: absent
